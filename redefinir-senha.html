<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Redefinir Senha | Tem no Entorno Sul</title>
    <link rel="canonical" href="https://www.temnoentornosul.com.br/redefinir-senha.html">

    <meta name="description" content="Defina uma nova senha para sua conta no Tem no Entorno Sul.">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#216c39">

    <link rel="icon" href="assets/logo-tem-no-entorno-sul.png">

    <link rel="stylesheet" href="css/public-layout.css">
    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="publicHeader"></div>

<ad-slot posicao="topo"></ad-slot>

<main class="auth-page">

    <section class="auth-card">

        <div class="auth-brand">

            <img
                src="assets/logo-tem-no-entorno-sul.png"
                onerror="this.src='https://i.imgur.com/9eZarki.png'"
                alt="Tem no Entorno Sul"
            >

            <h1>Redefinir senha</h1>

            <p>
                Após clicar no link recebido por e-mail, digite sua nova senha abaixo.
            </p>

        </div>

        <form
            id="redefinirSenhaForm"
            class="auth-form"
        >

            <div class="form-group">

                <label for="password">
                    Nova senha
                </label>

                <input
                    id="password"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    required
                >

            </div>

            <div class="form-group">

                <label for="confirmPassword">
                    Confirmar nova senha
                </label>

                <input
                    id="confirmPassword"
                    type="password"
                    autocomplete="new-password"
                    minlength="6"
                    required
                >

            </div>

            <button
                id="submitBtn"
                class="auth-btn"
                type="submit"
            >
                <i class="fas fa-key"></i>
                Atualizar senha
            </button>

            <div
                id="authMessage"
                class="auth-message"
            ></div>

        </form>

        <div class="auth-links">

            <a href="login.html">
                Voltar ao login
            </a>

        </div>

    </section>

</main>

<div id="publicFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="components/seo.js"></script>
<script src="components/public-header.js"></script>

<script src="components/ad-slot.js"></script>
<script src="components/public-footer.js"></script>

<script src="js/auth-redefinir-senha.js"></script>

    <script src="components/cookies.js"></script>
    <script src="components/analytics.js"></script>
</body>
</html>
