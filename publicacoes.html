<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Publicações | Tem no Entorno Sul</title>
    <link rel="canonical" href="https://www.temnoentornosul.com.br/publicacoes.html">

    <meta name="description" content="Últimas publicações do Tem no Entorno Sul. Notícias, artigos e conteúdos do Entorno Sul.">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#216c39">

    <link rel="icon" href="assets/logo-tem-no-entorno-sul.png">

    <link rel="stylesheet" href="css/public-layout.css">
    <link rel="stylesheet" href="css/publicacoes.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="publicHeader"></div>

<ad-slot posicao="topo"></ad-slot>

<main>
    <section class="hero">
        <div class="container">
            <span class="kicker">
                <i class="fas fa-newspaper"></i>
                Publicações
            </span>

            <h1>Últimas publicações</h1>
            <p>Notícias, artigos e conteúdos editoriais do Tem no Entorno Sul.</p>
        </div>
    </section>

    <section class="container filters-section">
        <div class="filters-card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input
                    id="searchInput"
                    type="search"
                    placeholder="Buscar por título, subtítulo, autor ou categoria..."
                    autocomplete="off"
                >
            </div>

            <div class="filter-group">
                <label for="categoriaFilter">Categoria</label>
                <select id="categoriaFilter">
                    <option value="">Todas as categorias</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="ordemFilter">Ordenação</label>
                <select id="ordemFilter">
                    <option value="recentes">Mais recentes</option>
                    <option value="antigas">Mais antigas</option>
                    <option value="destaques">Destaques primeiro</option>
                    <option value="titulo">Título A-Z</option>
                </select>
            </div>

            <button id="clearFiltersBtn" class="clear-btn" type="button">
                <i class="fas fa-eraser"></i>
                Limpar filtros
            </button>
        </div>

        <div id="resultsInfo" class="results-info"></div>
    </section>

    <section class="container publications-section">
        <div id="publicationsRoot" class="publications-grid">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Carregando publicações...</p>
            </div>
        </div>
    </section>
</main>

<ad-slot posicao="publicacoes_feed"></ad-slot>

<div id="publicFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="components/seo.js"></script>
<script src="components/public-header.js"></script>
<script src="components/ad-slot.js"></script>
<script src="components/public-footer.js"></script>
<script src="js/publicacoes.js"></script>

    <script src="components/cookies.js"></script>
    <script src="components/analytics.js"></script>
</body>
</html>
