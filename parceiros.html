<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Empresas Parceiras | Tem no Entorno Sul</title>
    <link rel="canonical" href="https://www.temnoentornosul.com.br/parceiros.html">

    <meta
        name="description"
        content="Conheça empresas parceiras, prestadores de serviços e comércios do Entorno Sul."
    >

    <meta
        name="robots"
        content="index,follow"
    >

    <meta
        name="theme-color"
        content="#216c39"
    >

    <link
        rel="icon"
        href="assets/logo-tem-no-entorno-sul.png"
    >

    <link
        rel="stylesheet"
        href="css/public-layout.css"
    >

    <link
        rel="stylesheet"
        href="css/parceiros.css"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>

<body>

<div id="publicHeader"></div>

<ad-slot posicao="topo"></ad-slot>

<main>

    <section class="hero">

        <div class="container">

            <span class="kicker">
                <i class="fas fa-store"></i>
                Empresas Parceiras
            </span>

            <h1>
                Empresas e Serviços do Entorno Sul
            </h1>

            <p>
                Encontre empresas, profissionais, comércios e serviços próximos de você.
            </p>

        </div>

    </section>

    <section class="container filters-section">

        <div class="filters-card">

            <div class="search-box">

                <i class="fas fa-search"></i>

                <input
                    id="searchInput"
                    type="search"
                    placeholder="Buscar empresa, serviço, categoria, cidade ou bairro..."
                    autocomplete="off"
                >

            </div>

            <div class="filter-group">

                <label for="tipoFilter">
                    Categoria
                </label>

                <select id="tipoFilter">

                    <option value="">
                        Todas
                    </option>

                </select>

            </div>

            <div class="filter-group">

                <label for="cidadeFilter">
                    Cidade
                </label>

                <select id="cidadeFilter">

                    <option value="">
                        Todas
                    </option>

                </select>

            </div>

            <div class="filter-group">

                <label for="ordemFilter">
                    Ordenação
                </label>

                <select id="ordemFilter">

                    <option value="destaques">
                        Destaques primeiro
                    </option>

                    <option value="recentes">
                        Mais recentes
                    </option>

                    <option value="titulo">
                        Nome A-Z
                    </option>

                    <option value="verificados">
                        Verificados primeiro
                    </option>

                </select>

            </div>

            <button
                id="usarLocalizacaoBtn"
                class="geo-btn"
                type="button"
            >
                <i class="fas fa-location-crosshairs"></i>
                Usar minha localização
            </button>

            <button
                id="clearFiltersBtn"
                class="clear-btn"
                type="button"
            >
                <i class="fas fa-eraser"></i>
                Limpar
            </button>

        </div>

        <div
            id="resultsInfo"
            class="results-info"
        ></div>

    </section>

    <section class="container map-section">

        <div
            id="mapBox"
            class="map-box"
        >

            <div class="map-empty">

                <i class="fas fa-map-location-dot"></i>

                <p>
                    Selecione uma empresa com localização para visualizar no mapa.
                </p>

            </div>

        </div>

    </section>

    <section class="container partners-section">

        <div
            id="parceirosRoot"
            class="partners-grid"
        >

            <div class="loading-state">

                <i class="fas fa-spinner fa-spin"></i>

                <p>
                    Carregando empresas...
                </p>

            </div>

        </div>

    </section>

</main>

<ad-slot posicao="parceiros_feed"></ad-slot>

<div id="publicFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-config.js"></script>

<script src="components/seo.js"></script>
<script src="components/public-header.js"></script>

<script src="components/ad-slot.js"></script>
<script src="components/public-footer.js"></script>

<script src="js/parceiros.js"></script>

    <script src="components/cookies.js"></script>
    <script src="components/analytics.js"></script>
</body>

</html>
