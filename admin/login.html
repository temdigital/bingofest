<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    >

    <title>Login Administrativo | Tem no Entorno Sul</title>

    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#216c39">

    <link rel="icon" href="https://i.imgur.com/9eZarki.png">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --primary: #216c39;
            --primary-dark: #184f2a;
            --yellow: #f9d22d;
            --orange: #fba309;
            --bg: #fffcf7;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --danger: #dc2626;
            --success: #16a34a;

            --shadow:
                0 20px 60px rgba(0,0,0,.12);

            --radius: 24px;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            min-height:100vh;
            font-family:'Roboto',sans-serif;

            background:
                radial-gradient(circle at top left,
                rgba(249,210,45,.25),
                transparent 30%),

                radial-gradient(circle at bottom right,
                rgba(251,163,9,.20),
                transparent 35%),

                linear-gradient(
                    135deg,
                    #216c39 0%,
                    #184f2a 100%
                );

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;
        }

        .container{
            width:100%;
            max-width:1100px;

            background:rgba(255,255,255,.97);

            border-radius:30px;

            overflow:hidden;

            box-shadow:var(--shadow);

            display:grid;
            grid-template-columns:1fr 1fr;
        }

        .left{
            background:
                linear-gradient(
                    180deg,
                    #216c39,
                    #184f2a
                );

            color:#fff;

            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }

        .logo{
            width:90px;
            height:90px;

            background:#fff;

            padding:10px;

            border-radius:20px;

            margin-bottom:30px;
        }

        .left h1{
            font-size:3rem;
            line-height:1.1;
            margin-bottom:20px;
        }

        .left p{
            font-size:1rem;
            line-height:1.8;
            opacity:.9;
        }

        .badges{
            display:flex;
            flex-wrap:wrap;
            gap:10px;

            margin-top:30px;
        }

        .badge{
            padding:10px 15px;

            border-radius:999px;

            background:rgba(255,255,255,.12);

            border:1px solid rgba(255,255,255,.18);

            font-size:.85rem;
        }

        .footer-left{
            opacity:.8;
            font-size:.9rem;
        }

        .right{
            background:var(--bg);

            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .top-title{
            margin-bottom:30px;
        }

        .top-title span{
            color:var(--primary);
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:1px;
            font-size:.85rem;
        }

        .top-title h2{
            font-size:2rem;
            margin-top:10px;
            margin-bottom:10px;
        }

        .top-title p{
            color:var(--muted);
            line-height:1.7;
        }

        .alert{
            display:none;

            padding:15px;

            border-radius:15px;

            margin-bottom:20px;

            font-size:.95rem;
        }

        .alert.show{
            display:block;
        }

        .alert-error{
            background:#fee2e2;
            color:#991b1b;
        }

        .alert-success{
            background:#dcfce7;
            color:#166534;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:700;
        }

        .input-wrapper{
            position:relative;
        }

        .input-wrapper i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#64748b;
        }

        input{
            width:100%;

            border:1px solid var(--border);

            background:#fff;

            padding:15px 15px 15px 45px;

            border-radius:15px;

            outline:none;

            font-size:1rem;
        }

        input:focus{
            border-color:var(--primary);
        }

        .btn{
            width:100%;

            border:none;

            background:linear-gradient(
                135deg,
                #216c39,
                #184f2a
            );

            color:#fff;

            padding:16px;

            border-radius:999px;

            font-size:1rem;
            font-weight:900;

            cursor:pointer;

            transition:.25s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .btn:disabled{
            opacity:.7;
            cursor:not-allowed;
        }

        .bottom-links{
            margin-top:20px;
            text-align:center;
        }

        .bottom-links a{
            color:var(--primary);
            text-decoration:none;
            font-weight:700;
        }

        @media(max-width:900px){

            .container{
                grid-template-columns:1fr;
            }

            .left{
                padding:35px;
            }

            .right{
                padding:35px;
            }

            .left h1{
                font-size:2rem;
            }
        }

        @media(max-width:480px){

            .left,
            .right{
                padding:25px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <section class="left">

        <div>

            <img
                src="https://i.imgur.com/9eZarki.png"
                alt="Tem no Entorno Sul"
                class="logo"
            >

            <h1>Painel Administrativo</h1>

            <p>
                Área exclusiva para administração do portal
                Tem no Entorno Sul.
            </p>

            <div class="badges">

                <div class="badge">
                    <i class="fas fa-shield-alt"></i>
                    Segurança
                </div>

                <div class="badge">
                    <i class="fas fa-newspaper"></i>
                    Conteúdo
                </div>

                <div class="badge">
                    <i class="fas fa-store"></i>
                    Negócios
                </div>

            </div>

        </div>

        <div class="footer-left">
            Tem no Entorno Sul — Sua fonte de notícias regional
        </div>

    </section>

    <section class="right">

        <div class="top-title">

            <span>
                Área Restrita
            </span>

            <h2>
                Entrar no Painel
            </h2>

            <p>
                Utilize suas credenciais administrativas.
            </p>

        </div>

        <div
            id="errorMessage"
            class="alert alert-error"
        ></div>

        <div
            id="successMessage"
            class="alert alert-success"
        ></div>

        <form id="loginForm">

            <div class="form-group">

                <label for="email">
                    E-mail
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        required
                        autocomplete="email"
                    >

                </div>

            </div>

            <div class="form-group">

                <label for="password">
                    Senha
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        required
                        autocomplete="current-password"
                    >

                </div>

            </div>

            <button
                type="submit"
                id="submitBtn"
                class="btn"
            >
                Entrar no Painel
            </button>

        </form>

        <div class="bottom-links">

            <a href="../index.html">
                Voltar para o Portal
            </a>

        </div>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase-config.js"></script>

<script src="login.js"></script>

</body>
</html>
