<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar | Tem no Entorno Sul</title>
    <link rel="canonical" href="https://www.temnoentornosul.com.br/login.html">

    <meta name="description" content="Entre na sua conta do Tem no Entorno Sul.">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#216c39">

    <link rel="icon" href="assets/logo-tem-no-entorno-sul.png">

    <link rel="stylesheet" href="css/public-layout.css">
    <link rel="stylesheet" href="css/auth.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div id="publicHeader"></div>

<ad-slot posicao="topo"></ad-slot>

<main class="auth-page">
    <section class="auth-card">
        <div class="auth-brand">
            <img
                src="assets/logo-tem-no-entorno-sul.png"
                onerror="this.src='https://i.imgur.com/9eZarki.png'"
                alt="Tem no Entorno Sul"
            >

            <h1>Entrar</h1>
            <p>Acesse sua conta para curtir, favoritar, comentar e ganhar pontos no portal.</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input id="password" type="password" autocomplete="current-password" required>
            </div>

            <button id="submitBtn" class="auth-btn" type="submit">
                <i class="fas fa-right-to-bracket"></i>
                Entrar
            </button>

            <div id="authMessage" class="auth-message"></div>
        </form>

        <div class="auth-links">
            <a href="cadastro.html">Criar conta</a>
            <a href="recuperar-senha.html">Esqueci minha senha</a>
        </div>
    </section>
</main>

<div id="publicFooter"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="components/seo.js"></script>
<script src="components/public-header.js"></script>
<script src="components/ad-slot.js"></script>
<script src="components/public-footer.js"></script>
<script src="js/auth-login.js"></script>

    <script src="components/cookies.js"></script>
    <script src="components/analytics.js"></script>
</body>
</html>
